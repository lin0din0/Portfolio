<title>Lin Nora — Connect the dots</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#FAFAF7;display:flex;flex-direction:column;align-items:center;padding:0;gap:4px;position:relative;width:100%;}

.hint{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#999;}
.stage{position:relative;width:100%;max-width:100%;aspect-ratio:1;}

/* dots canvas — on top, fades out at 100% */
#cv{
  position:absolute;inset:0;cursor:none;
  width:100%;height:100%;
  transition:opacity 1.4s ease;
  z-index:2;
}

/* portrait — behind canvas, fades in at 100% */
#portrait{
  position:absolute;inset:0;
  opacity:0;
  transition:opacity 1.4s ease;
  z-index:1;
  overflow:hidden;
}
#portrait svg{position:absolute;inset:0;width:100%;height:100%;}

.bar-row{display:flex;align-items:center;gap:10px;width:100%;max-width:100%;}
.bt{flex:1;height:1px;background:#e0e0e0;}
@media(prefers-color-scheme:dark){.bt{background:#333;}}
.bf{height:100%;width:0%;background:#111;transition:width 0.1s;}
@media(prefers-color-scheme:dark){.bf{background:#fff;}}
.bp{font-size:11px;color:#999;min-width:32px;text-align:right;}
.rm{position:absolute;top:8px;left:0;right:0;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;font-style:normal;color:#999;opacity:0;transition:opacity 1s;text-align:center;font-family:system-ui,sans-serif;}

</style>

  for(let gx=x0;gx<=x1;gx++)for(let gy=y0;gy<=y1;gy++){const k=gx+','+gy;if(grid[k])grid[k].forEach(i=>{if(Math.hypot(pts[i][0]-mx,pts[i][1]-my)<=r)res.push(i);});}
  return res;
}

const hit=new Uint8Array(N);
let count=0,done=false,autoFilling=false;

function draw(){
  ctx.clearRect(0,0,S,S);
  ctx.lineWidth=0.4;ctx.strokeStyle=CL;ctx.beginPath();
  for(let a=0;a<N;a++){
    if(!hit[a])continue;const[ax,ay]=pts[a];
    for(let b=a+1;b<N;b++){
      if(!hit[b])continue;const[bx,by]=pts[b];
      if(Math.hypot(ax-bx,ay-by)<=LINK){ctx.moveTo(ax,ay);ctx.lineTo(bx,by);}
    }
  }
  ctx.stroke();
  for(let i=0;i<N;i++){
    const[x,y]=pts[i];ctx.beginPath();ctx.arc(x,y,hit[i]?1.3:1.1,0,Math.PI*2);
    ctx.fillStyle=hit[i]?C1:C0;ctx.fill();
  }
}

// Auto-fill remaining dots in small batches with animation
function autoFill(){
  if(done)return;
  autoFilling=true;
  const remaining=[];
  for(let i=0;i<N;i++) if(!hit[i]) remaining.push(i);
  if(remaining.length===0){ triggerReveal(); return; }
  
  // Fill in batches of ~30 per frame for a fast sweep effect
  let idx=0;
  function step(){
    if(done)return;
    const batch=Math.min(30,remaining.length-idx);
    for(let b=0;b<batch;b++){
      const i=remaining[idx++];
      hit[i]=1;count++;
    }
    const p=Math.round(count/N*100);
    document.getElementById('bf').style.width=p+'%';
    document.getElementById('bp').textContent=p+'%';
    draw();
    if(idx<remaining.length) requestAnimationFrame(step);
    else triggerReveal();
  }
  requestAnimationFrame(step);
}

function triggerReveal(){
  if(done)return;
  done=true;
  // Hard switch: canvas out, portrait in
  cv.style.opacity='0';
  document.getElementById('portrait').style.opacity='1';
  setTimeout(()=>{
    document.getElementById('rm').style.opacity='1';
  },1600);
}

function prog(){
  const p=count/N;
  document.getElementById('bf').style.width=Math.round(p*100)+'%';
  document.getElementById('bp').textContent=Math.round(p*100)+'%';
  draw();
  // At 90%, auto-complete the rest
  if(p>=AUTOCOMPLETE_AT && !autoFilling && !done) autoFill();
  else if(p>=1 && !done) triggerReveal();
}

function move(e){
  if(done||autoFilling)return;
  const r=cv.getBoundingClientRect(),sx=S/r.width,sy=S/r.height;
  let mx,my;
  if(e.touches){mx=(e.touches[0].clientX-r.left)*sx;my=(e.touches[0].clientY-r.top)*sy;}
  else{mx=(e.clientX-r.left)*sx;my=(e.clientY-r.top)*sy;}
  const nb=nearby(mx,my,HR_NORMAL);
  let ch=false;
  nb.forEach(i=>{if(!hit[i]){hit[i]=1;count++;ch=true;}});
  if(ch) prog();
}

cv.addEventListener('mousemove',move);
cv.addEventListener('touchmove',e=>{e.preventDefault();move(e);},{passive:false});
cv.addEventListener('touchstart',e=>{e.preventDefault();move(e);},{passive:false});

function rst(){
  hit.fill(0);count=0;done=false;autoFilling=false;
  cv.style.opacity='1';
  document.getElementById('portrait').style.opacity='0';
  document.getElementById('bf').style.width='0%';
  document.getElementById('bp').textContent='0%';
  document.getElementById('rm').style.opacity='0';
  draw();
}

draw();
</script>
</body>
