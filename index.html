<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lin Nora — Designer · Oslo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *,*::before,*::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  :root {
    --bg: #FAFAF7;
    --bg-soft: #F3F1EB;
    --ink: #0E0E0C;
    --ink-2: #2A2A26;
    --muted: #8A8780;
    --line: #1a1a1a;
    --line-soft: rgba(14,14,12,0.14);
    --dashed: rgba(14,14,12,0.28);
    --accent: #0E0E0C;
    --card: #FFFFFF;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .dots-bg { background-image: radial-gradient(circle, var(--dashed) 1px, transparent 1px); background-size: 14px 14px; }
  .pf-artboard { background: var(--bg); color: var(--ink); }

  /* offset anchor targets so they don't hide behind the sticky nav */
  section[id] { scroll-margin-top: 80px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="portfolio-core.jsx?v=21"></script>
  <script type="text/babel" src="portfolio-sections.jsx?v=11"></script>

  <script type="text/babel">
    const { useEffect: useEffectPage, useState: useStatePage } = React;

    function StickyNav() {
      const [scrolled, setScrolled] = useStatePage(false);
      useEffectPage(() => {
        const onScroll = () => setScrolled(window.scrollY > 12);
        onScroll();
        window.addEventListener("scroll", onScroll, { passive: true });
        return () => window.removeEventListener("scroll", onScroll);
      }, []);
      const link = (href, label) => (
        <a href={href} style={{
          color: "var(--ink)", textDecoration: "none",
          fontFamily: "'Hanken Grotesk', sans-serif",
          fontSize: 14, fontWeight: 400, letterSpacing: "-0.005em",
        }}>{label}</a>
      );
      return (
        <nav style={{
          position: "sticky", top: 0, zIndex: 100,
          display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: scrolled ? "18px 48px" : "28px 48px",
          background: scrolled ? "rgba(250,250,247,0.82)" : "transparent",
          backdropFilter: scrolled ? "blur(10px) saturate(140%)" : "none",
          WebkitBackdropFilter: scrolled ? "blur(10px) saturate(140%)" : "none",
          borderBottom: scrolled ? "1px solid var(--line-soft)" : "1px solid transparent",
          transition: "padding .3s, background .3s, border-color .3s",
        }}>
          <a href="index.html#top" style={{
            color: "var(--ink)", textDecoration: "none",
            fontFamily: "'Hanken Grotesk', sans-serif",
            fontWeight: 500, fontSize: 14, letterSpacing: "-0.01em",
            display: "inline-flex", alignItems: "center", gap: 8,
          }}>
            Lin Nora
            <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: "50%", background: "var(--ink)" }} />
          </a>
          <div style={{ display: "flex", gap: 40 }}>
            {link("about.html", "About")}
            {link("#work", "Projects")}
            {link("#contact", "Connect")}
          </div>
        </nav>
      );
    }

    function PageApp() {
      useEffectPage(() => {
        if (document.getElementById("__pf_kf")) return;
        const s = document.createElement("style");
        s.id = "__pf_kf"; s.textContent = KEYFRAMES;
        document.head.appendChild(s);
      }, []);

      const noHover = () => {};
      return (
        <div className="pf-artboard" data-bg="warm">
          <StickyNav />

          {/* HERO — minimum height to fill viewport below sticky nav */}
          <div style={{ minHeight: "calc(100vh - 86px)" }}>
            <Hero onHover={noHover} />
          </div>

          {/* PROJECTS — tabbed, all 3 categories in one section */}
          <Projects onHover={noHover} />

          {/* TOOLKIT */}
          <div style={{ minHeight: "calc(100vh - 86px)" }}>
            <Skills onHover={noHover} />
          </div>

          {/* CONNECT */}
          <div style={{ minHeight: "80vh" }}>
            <Footer onHover={noHover} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PageApp />);
  </script>
</body>
</html>
