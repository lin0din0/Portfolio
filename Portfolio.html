<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lin Nora — UX Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background: #E8E4DA;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
    margin: 0;
  }
  /* canvas surface — soft warm gray so warm-bg artboards pop */
  .pf-artboard { background: var(--bg); color: var(--ink); position: relative; overflow: hidden; }
  .pf-artboard a, .pf-artboard button { cursor: pointer; }
  :root {
    --bg: #FAFAF7;
    --bg-soft: #F3F1EB;
    --ink: #0E0E0C;
    --ink-2: #2A2A26;
    --muted: #8A8780;
    --line: #1a1a1a;
    --line-soft: rgba(14,14,12,0.14);
    --dashed: rgba(14,14,12,0.28);
    --accent: #0E0E0C;
    --card: #FFFFFF;
  }
  body[data-bg="white"] { --bg:#FFFFFF; --bg-soft:#F6F4EE; --card:#FAFAF7; }
  body[data-bg="cream"] { --bg:#F4EFE5; --bg-soft:#EBE5D8; --card:#FAF7EF; }
  body[data-bg="ink"]   { --bg:#0E0E0C; --bg-soft:#1A1A17; --ink:#FAFAF7; --ink-2:#E8E6E0; --muted:#8F8C84; --line:#FAFAF7; --line-soft:rgba(250,250,247,0.18); --dashed:rgba(250,250,247,0.34); --accent:#FAFAF7; --card:#16161390; }

  ::selection { background: var(--ink); color: var(--bg); }
</style>

<script type="application/json" id="tweak-meta">{}</script>
</head>
<body data-bg="warm">
  <div id="root"></div>

  <script>
    // Seed a sensible initial viewport for the design canvas on first load.
    // Runs synchronously before the babel scripts so the canvas's
    // useLayoutEffect picks it up on mount. Skipped if the user has already
    // pan/zoomed.
    try {
      const key = "dc-viewport:" + location.pathname;
      if (!localStorage.getItem(key)) {
        localStorage.setItem(key, JSON.stringify({ x: 80, y: 60, scale: 0.16 }));
      }
    } catch (e) {}
  </script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="portfolio-core.jsx?v=21"></script>
  <script type="text/babel" src="portfolio-sections.jsx"></script>
  <script type="text/babel" src="portfolio-project.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>
</body>
</html>
