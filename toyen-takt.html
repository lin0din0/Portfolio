<style>
  *,*::before,*::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  :root {
    --bg: #FAFAF7;
    --bg-soft: #F3F1EB;
    --ink: #0E0E0C;
    --ink-2: #2A2A26;
    --muted: #8A8780;
    --line: #1a1a1a;
    --line-soft: rgba(14,14,12,0.14);
    --dashed: rgba(14,14,12,0.28);
    --accent: #0E0E0C;
    --card: #FFFFFF;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .dots-bg { background-image: radial-gradient(circle, var(--dashed) 1px, transparent 1px); background-size: 14px 14px; }
  .pf-artboard { background: var(--bg); color: var(--ink); }
</style>

  <div id="root"></div>

  <script type="text/babel" src="portfolio-core.jsx?v=21"></script>

  <script type="text/babel">
    const { useEffect: useEffectProj } = React;

    function ProjectApp() {
      useEffectProj(() => {
        if (document.getElementById("__pf_kf")) return;
        const s = document.createElement("style");
        s.id = "__pf_kf"; s.textContent = KEYFRAMES;
        document.head.appendChild(s);
      }, []);

      return <ProjectDetailToyen />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ProjectApp />);
  </script>
