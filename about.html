<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Lin Nora — About</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *,*::before,*::after { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }
  :root {
    --bg: #FAFAF7;
    --bg-soft: #F3F1EB;
    --ink: #0E0E0C;
    --ink-2: #2A2A26;
    --muted: #8A8780;
    --line: #1a1a1a;
    --line-soft: rgba(14,14,12,0.14);
    --dashed: rgba(14,14,12,0.28);
    --accent: #0E0E0C;
    --card: #FFFFFF;
  }
  ::selection { background: var(--ink); color: var(--bg); }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .pf-artboard { background: var(--bg); color: var(--ink); }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="portfolio-core.jsx?v=21"></script>
  <script type="text/babel" src="portfolio-sections.jsx"></script>

  <script type="text/babel">
    const { useEffect: useEffectAbout } = React;

    function StickyNav() {
      const link = (href, label) => (
        <a href={href} style={{
          color: "var(--ink)", textDecoration: "none",
          fontFamily: "'Hanken Grotesk', sans-serif",
          fontSize: 14, fontWeight: 400, letterSpacing: "-0.005em",
        }}>{label}</a>
      );
      return (
        <nav style={{
          position: "sticky", top: 0, zIndex: 100,
          display: "flex", justifyContent: "space-between", alignItems: "center",
          padding: "28px 48px",
          background: "rgba(250,250,247,0.82)",
          backdropFilter: "blur(10px) saturate(140%)",
          WebkitBackdropFilter: "blur(10px) saturate(140%)",
          borderBottom: "1px solid var(--line-soft)",
        }}>
          <a href="index.html" style={{
            color: "var(--ink)", textDecoration: "none",
            fontFamily: "'Hanken Grotesk', sans-serif",
            fontWeight: 500, fontSize: 14, letterSpacing: "-0.01em",
            display: "inline-flex", alignItems: "center", gap: 8,
          }}>
            Lin Nora
            <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: "50%", background: "var(--ink)" }} />
          </a>
          <div style={{ display: "flex", gap: 40 }}>
            {link("about.html", "About")}
            {link("index.html#work", "Projects")}
            {link("index.html#contact", "Connect")}
          </div>
        </nav>
      );
    }

    function AboutApp() {
      useEffectAbout(() => {
        if (document.getElementById("__pf_kf")) return;
        const s = document.createElement("style");
        s.id = "__pf_kf"; s.textContent = KEYFRAMES;
        document.head.appendChild(s);
      }, []);

      const noHover = () => {};
      return (
        <div className="pf-artboard" data-bg="warm">
          <StickyNav />
          <About onHover={noHover} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AboutApp />);
  </script>
</body>
</html>
